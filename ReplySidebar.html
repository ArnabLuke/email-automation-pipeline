<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
  </head>
  <body>
    <h2>Send Email Replies</h2>
    <form>
      <label for="emailBody">Email Body:</label><br>
      <textarea id="emailBody" name="emailBody" rows="10" cols="30"></textarea><br><br>
      <input type="button" value="Send Replies" onclick="sendReplies()">
    </form>
    <script>
      function sendReplies() {
        var emailBody = document.getElementById('emailBody').value;
        google.script.run.sendAllReplies(emailBody);
      }
    </script>
  </body>
</html>
